<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>たまならべ攻略wiki</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
background:linear-gradient(180deg,#0f172a,#111827);
color:white;
min-height:100vh;
}

/* ---------- ヘッダー ---------- */

.header{
text-align:center;
padding:40px 20px;
}

.icon{
width:120px;
border-radius:26px;
box-shadow:
0 10px 30px rgba(0,0,0,0.6),
0 0 15px rgba(255,255,255,0.2);
margin-bottom:20px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.sub{
opacity:0.8;
font-size:14px;
}

/* ---------- 攻略メニュー ---------- */

.menu{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:20px;
border:1px solid rgba(255,255,255,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card h2{
font-size:20px;
margin-bottom:10px;
}

.card p{
font-size:14px;
opacity:0.8;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

/* ---------- 切り替え画面 ---------- */

#trapScreen{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:#020617;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

font-size:50px;
font-weight:bold;

visibility:hidden;
}

#trapText{
font-size:clamp(40px,8vw,90px);
}

</style>
</head>

<body>


<!-- 攻略画面 -->

<div id="main">

<div class="header">

<img src="icon.PNG" class="icon">

<h1>たまならべ攻略wiki</h1>

<div class="sub">
最強攻略・裏技・最新情報まとめ
</div>

</div>


<div class="menu">

<div class="card">
<h2>コイン1000枚の裏技</h2>
<p>序盤から一気にコインを稼ぐ裏技を紹介。</p>
<button onclick="openTrap()">見る</button>
</div>

<div class="card">
<h2>ステージ情報</h2>
<p>各ステージの攻略ポイントを徹底解説。</p>
<button onclick="openTrap()">見る</button>
</div>

<div class="card">
<h2>課金を無料にする方法</h2>
<p>誰も知らない禁断のテクニック。</p>
<button onclick="openTrap()">見る</button>
</div>

<div class="card">
<h2>広告を消すには</h2>
<p>快適にプレイするための方法。</p>
<button onclick="openTrap()">見る</button>
</div>

</div>

</div>



<!-- 罠画面 -->

<div id="trapScreen">

<div id="trapText"></div>

</div>



<script>

function openTrap(){

document.getElementById("main").style.display="none"

const screen=document.getElementById("trapScreen")
const text=document.getElementById("trapText")

screen.style.visibility="visible"

const msg="こんなのに頼るな"

let i=0

text.innerHTML=""

let timer=setInterval(()=>{

text.innerHTML+=msg[i]

i++

if(i>=msg.length){

clearInterval(timer)

setTimeout(()=>{

text.innerHTML=msg

},300)

}

},120)

}

</script>

</body>
</html>
