<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>たまならべ攻略wiki</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#0f172a,#111827);
  color:white;
  min-height:100vh;
  overflow:hidden;
}

/* ---------- ヘッダー ---------- */

.header{
  text-align:center;
  padding:40px 20px;
}

.icon{
  width:120px;
  border-radius:26px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    0 0 15px rgba(255,255,255,0.2);
  margin-bottom:20px;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

.sub{
  opacity:0.8;
  font-size:14px;
}

/* ---------- 攻略メニュー ---------- */

.menu{
  max-width:900px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card h2{
  font-size:20px;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* ---------- 切り替え画面 ---------- */

#trapScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  visibility:hidden;
  overflow:hidden;
  padding:20px;
}

/* 爆発前の文字 */
#trapText{
  font-size:clamp(28px,7vw,90px);
  font-weight:900;
  letter-spacing:0.04em;
  text-align:center;
  z-index:2;
  max-width:92vw;
  line-height:1.2;
  word-break:keep-all;
  overflow-wrap:break-word;
  padding:0 16px;
}

/* 爆発エフェクト開始後 */
#trapText.explode{
  animation:
    explodeScale 0.45s ease-out forwards,
    violentShake 0.08s linear infinite,
    rainbowText 0.5s linear infinite,
    glowFlash 0.35s ease-in-out infinite;
}

/* 背景フラッシュ */
#trapScreen.flash{
  animation:
    bgFlash 0.12s linear infinite,
    rainbowBg 0.5s linear infinite;
}

/* 爆発リング */
.boom-ring{
  position:absolute;
  width:40px;
  height:40px;
  border:8px solid white;
  border-radius:50%;
  opacity:0;
  pointer-events:none;
  z-index:1;
}

.boom-ring.active{
  animation:ringBoom 0.7s ease-out forwards;
}

/* パーティクル */
.particle{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  opacity:0;
}

.particle.active{
  animation:particleFly 0.9s ease-out forwards;
}

/* ---------- アニメーション ---------- */

@keyframes explodeScale{
  0%{
    transform:scale(1);
  }
  35%{
    transform:scale(2.2);
  }
  55%{
    transform:scale(1.6);
  }
  75%{
    transform:scale(2.0);
  }
  100%{
    transform:scale(1.85);
  }
}

@keyframes violentShake{
  0%   { transform:translate(0,0) scale(1.85) rotate(0deg); }
  20%  { transform:translate(-8px,5px) scale(1.85) rotate(-2deg); }
  40%  { transform:translate(8px,-6px) scale(1.85) rotate(2deg); }
  60%  { transform:translate(-6px,-4px) scale(1.85) rotate(-1deg); }
  80%  { transform:translate(7px,5px) scale(1.85) rotate(1deg); }
  100% { transform:translate(0,0) scale(1.85) rotate(0deg); }
}

@keyframes rainbowText{
  0%{
    color:#ff003c;
    text-shadow:0 0 10px #ff003c,0 0 20px #ff003c,0 0 40px #ff003c;
  }
  16%{
    color:#ff8a00;
    text-shadow:0 0 10px #ff8a00,0 0 20px #ff8a00,0 0 40px #ff8a00;
  }
  33%{
    color:#ffee00;
    text-shadow:0 0 10px #ffee00,0 0 20px #ffee00,0 0 40px #ffee00;
  }
  50%{
    color:#00ff85;
    text-shadow:0 0 10px #00ff85,0 0 20px #00ff85,0 0 40px #00ff85;
  }
  66%{
    color:#00c3ff;
    text-shadow:0 0 10px #00c3ff,0 0 20px #00c3ff,0 0 40px #00c3ff;
  }
  83%{
    color:#8b5cf6;
    text-shadow:0 0 10px #8b5cf6,0 0 20px #8b5cf6,0 0 40px #8b5cf6;
  }
  100%{
    color:#ff003c;
    text-shadow:0 0 10px #ff003c,0 0 20px #ff003c,0 0 40px #ff003c;
  }
}

@keyframes glowFlash{
  0%,100%{ filter:brightness(1); }
  50%{ filter:brightness(1.9); }
}

@keyframes bgFlash{
  0%{ filter:brightness(1); }
  50%{ filter:brightness(1.7); }
  100%{ filter:brightness(1); }
}

@keyframes rainbowBg{
  0%{ background:#22000a; }
  16%{ background:#2a1400; }
  33%{ background:#2a2900; }
  50%{ background:#002a14; }
  66%{ background:#001d2a; }
  83%{ background:#1a0030; }
  100%{ background:#22000a; }
}

@keyframes ringBoom{
  0%{
    transform:translate(-50%,-50%) scale(0.3);
    opacity:1;
  }
  100%{
    transform:translate(-50%,-50%) scale(9);
    opacity:0;
  }
}

@keyframes particleFly{
  0%{
    transform:translate(0,0) scale(1);
    opacity:1;
  }
  100%{
    transform:translate(var(--x),var(--y)) scale(0.2);
    opacity:0;
  }
}

/* ---------- スマホ用調整 ---------- */

@media (max-width: 600px){
  .header{
    padding:28px 16px;
  }

  .icon{
    width:96px;
  }

  h1{
    font-size:30px;
  }

  .sub{
    font-size:13px;
  }

  .menu{
    padding:16px;
    gap:16px;
  }

  #trapText{
    font-size:clamp(24px,8vw,48px);
    letter-spacing:0.02em;
    max-width:95vw;
    line-height:1.25;
    padding:0 10px;
  }

  #trapText.explode{
    animation:
      explodeScaleMobile 0.45s ease-out forwards,
      violentShakeMobile 0.08s linear infinite,
      rainbowText 0.5s linear infinite,
      glowFlash 0.35s ease-in-out infinite;
  }
}

@keyframes explodeScaleMobile{
  0%{ transform:scale(1); }
  35%{ transform:scale(1.45); }
  55%{ transform:scale(1.2); }
  75%{ transform:scale(1.35); }
  100%{ transform:scale(1.28); }
}

@keyframes violentShakeMobile{
  0%   { transform:translate(0,0) scale(1.28) rotate(0deg); }
  20%  { transform:translate(-3px,2px) scale(1.28) rotate(-1deg); }
  40%  { transform:translate(3px,-2px) scale(1.28) rotate(1deg); }
  60%  { transform:translate(-2px,-2px) scale(1.28) rotate(-0.8deg); }
  80%  { transform:translate(2px,2px) scale(1.28) rotate(0.8deg); }
  100% { transform:translate(0,0) scale(1.28) rotate(0deg); }
}
</style>
</head>

<body>

<div id="main">
  <div class="header">
    <img src="icon.PNG" class="icon">
    <h1>たまならべ攻略wiki</h1>
    <div class="sub">最強攻略・裏技・最新情報まとめ</div>
  </div>

  <div class="menu">
    <div class="card">
      <h2>コイン1000枚の裏技</h2>
      <p>序盤から一気にコインを稼ぐ裏技を紹介。</p>
      <button onclick="openTrap()">見る</button>
    </div>

    <div class="card">
      <h2>ステージ情報</h2>
      <p>各ステージの攻略ポイントを徹底解説。</p>
      <button onclick="openTrap()">見る</button>
    </div>

    <div class="card">
      <h2>課金を無料にする方法</h2>
      <p>誰も知らない禁断のテクニック。</p>
      <button onclick="openTrap()">見る</button>
    </div>

    <div class="card">
      <h2>広告を消すには</h2>
      <p>快適にプレイするための方法。</p>
      <button onclick="openTrap()">見る</button>
    </div>
  </div>
</div>

<div id="trapScreen">
  <div id="trapText"></div>
</div>

<script>
function openTrap(){
  document.getElementById("main").style.display = "none";

  const screen = document.getElementById("trapScreen");
  const text = document.getElementById("trapText");

  screen.style.visibility = "visible";

  const msg = "こんなのに頼るな";
  let i = 0;
  text.innerHTML = "";
  text.classList.remove("explode");
  screen.classList.remove("flash");

  const oldRings = document.querySelectorAll(".boom-ring");
  const oldParticles = document.querySelectorAll(".particle");
  oldRings.forEach(el => el.remove());
  oldParticles.forEach(el => el.remove());

  let timer = setInterval(() => {
    text.innerHTML += msg[i];
    i++;

    if(i >= msg.length){
      clearInterval(timer);

      setTimeout(() => {
        text.innerHTML = msg;
        explodeEffect();
      }, 300);
    }
  }, 120);

  function explodeEffect(){
    text.classList.add("explode");
    screen.classList.add("flash");

    createBoomRing();
    createParticles(40);
  }

  function createBoomRing(){
    const ring = document.createElement("div");
    ring.className = "boom-ring active";

    const rect = text.getBoundingClientRect();
    ring.style.left = (rect.left + rect.width / 2) + "px";
    ring.style.top = (rect.top + rect.height / 2) + "px";

    screen.appendChild(ring);

    setTimeout(() => {
      ring.remove();
    }, 700);
  }

  function createParticles(count){
    const rect = text.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for(let j = 0; j < count; j++){
      const p = document.createElement("div");
      p.className = "particle active";

      const angle = Math.random() * Math.PI * 2;
      const distance = 120 + Math.random() * 260;

      const x = Math.cos(angle) * distance + "px";
      const y = Math.sin(angle) * distance + "px";

      p.style.left = cx + "px";
      p.style.top = cy + "px";
      p.style.setProperty("--x", x);
      p.style.setProperty("--y", y);

      const hue = Math.random() * 360;
      p.style.background = `hsl(${hue} 100% 60%)`;
      p.style.boxShadow = `0 0 12px hsl(${hue} 100% 60%)`;

      screen.appendChild(p);

      setTimeout(() => {
        p.remove();
      }, 900);
    }
  }
}
</script>

</body>
</html>
