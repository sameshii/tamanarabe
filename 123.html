<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暇かよ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 18%, transparent 45%),
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.06), transparent 35%),
        #000;
      animation: pulseBg 4s ease-in-out infinite;
    }

    h1 {
      position: relative;
      color: #fff;
      font-size: clamp(64px, 16vw, 220px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.1;
      transform: scale(0.2);
      opacity: 0;
      animation:
        popIn 1.2s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards,
        floatText 2.8s ease-in-out 1.2s infinite,
        flash 2.8s ease-in-out 1.2s infinite;
      text-shadow:
        0 0 10px rgba(255,255,255,0.35),
        0 0 25px rgba(255,255,255,0.25),
        0 0 50px rgba(255,255,255,0.15);
    }

    h1::after {
      content: "暇かよ";
      position: absolute;
      inset: 0;
      color: rgba(255,255,255,0.18);
      filter: blur(18px);
      z-index: -1;
      animation: blurPulse 2.8s ease-in-out 1.2s infinite;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.2) rotate(-8deg);
        opacity: 0;
      }
      60% {
        transform: scale(1.18) rotate(2deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes floatText {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.03);
      }
    }

    @keyframes flash {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(255,255,255,0.35),
          0 0 25px rgba(255,255,255,0.25),
          0 0 50px rgba(255,255,255,0.15);
      }
      50% {
        text-shadow:
          0 0 20px rgba(255,255,255,0.7),
          0 0 40px rgba(255,255,255,0.45),
          0 0 80px rgba(255,255,255,0.3);
      }
    }

    @keyframes blurPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.08);
        opacity: 0.9;
      }
    }

    @keyframes pulseBg {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.04);
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <h1>暇かよ</h1>
</body>
</html>
